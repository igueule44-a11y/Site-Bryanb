<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#0d1a2e"/>
      <stop offset="100%" stop-color="#060c18"/>
    </radialGradient>
    <radialGradient id="glowGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#7de8f7" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#00d4ff" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="ringGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7de8f7"/>
      <stop offset="50%" stop-color="#00d4ff"/>
      <stop offset="100%" stop-color="#5bc8d8"/>
    </linearGradient>
  </defs>

  <!-- Background circle -->
  <circle cx="16" cy="16" r="16" fill="url(#bgGrad)"/>

  <!-- Subtle glow -->
  <circle cx="16" cy="16" r="14" fill="url(#glowGrad)"/>

  <!-- Letter O — outer ring -->
  <circle cx="16" cy="16" r="10" fill="none" stroke="url(#ringGrad)" stroke-width="3.2"/>

  <!-- Inner cut to make the O thinner -->
  <circle cx="16" cy="16" r="6.8" fill="url(#bgGrad)"/>

  <!-- Top highlight on the O ring -->
  <path d="M 10.5 10 A 7.8 7.8 0 0 1 21.5 10" fill="none" stroke="#a8f0fa" stroke-width="1.2" stroke-linecap="round" opacity="0.6"/>
</svg>
