<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <linearGradient id="silverGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#d0daea"/>
      <stop offset="30%" stop-color="#b8c8dc"/>
      <stop offset="60%" stop-color="#8fa5bf"/>
      <stop offset="100%" stop-color="#6a85a0"/>
    </linearGradient>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0b1220"/>
      <stop offset="100%" stop-color="#060c18"/>
    </linearGradient>
  </defs>

  <!-- Dark navy background -->
  <rect width="32" height="32" fill="url(#bgGrad)" rx="4"/>

  <!-- Square frame (the O) with rounded corners -->
  <rect x="5" y="5" width="22" height="22" rx="2.5" ry="2.5"
        fill="none" stroke="url(#silverGrad)" stroke-width="2.2"/>

  <!-- Diagonal lines forming the X inside -->
  <line x1="7.5" y1="7.5" x2="24.5" y2="24.5" stroke="url(#silverGrad)" stroke-width="1.6" stroke-linecap="round"/>
  <line x1="24.5" y1="7.5" x2="7.5" y2="24.5" stroke="url(#silverGrad)" stroke-width="1.6" stroke-linecap="round"/>
</svg>
